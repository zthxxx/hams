name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19

  lint-spell:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "**"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w \
            -X github.com/zthxxx/hams/internal/version.version=${VERSION} \
            -X github.com/zthxxx/hams/internal/version.commit=${COMMIT} \
            -X github.com/zthxxx/hams/internal/version.date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o bin/hams-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/hams

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hams-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/hams-${{ matrix.goos }}-${{ matrix.goarch }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run integration tests
        run: docker build -f e2e/integration/Dockerfile -t hams-integration . && docker run --rm hams-integration

  e2e:
    name: E2E (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        target: [debian, alpine, openwrt]
    steps:
      - uses: actions/checkout@v4

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: hams-linux-amd64
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/hams-linux-amd64

      - name: Run ${{ matrix.target }} e2e tests
        run: |
          docker build -f e2e/${{ matrix.target }}/Dockerfile -t hams-e2e-${{ matrix.target }} .
          docker run --rm -v "$(pwd)/e2e/fixtures:/fixtures:ro" hams-e2e-${{ matrix.target }}
