default: true

# MD003 - Heading style
MD003:
  style: atx

# MD007 - Unordered list indentation
MD007:
  indent: 2

# MD013 - Line length
MD013: false

# MD024 - Multiple headings with the same content
MD024:
  siblings_only: true

# MD033 - Inline HTML
MD033: false

# MD041 - First line in file should be a top level heading
MD041: false

# MD046 - Code block style
MD046:
  style: fenced

# MD048 - Code fence style
MD048:
  style: backtick
