name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: task ci:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hams-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/hams-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package release files
        run: task ci:release:package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  bump-homebrew-tap:
    name: Bump Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    # Skip pre-releases / release candidates — we only ship stable semver to
    # the tap. Adjust the pattern if you later need to ship -beta.N to brew.
    if: "!contains(github.ref_name, '-')"
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Formula in zthxxx/homebrew-tap
        env:
          # PAT with `repo` scope on zthxxx/homebrew-tap. The default
          # GITHUB_TOKEN cannot reach another repository, so a dedicated
          # secret is required. See scripts/ci/bump-homebrew-tap.sh for the
          # full contract (required scopes, retry semantics, PR shape).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: task ci:release:bump-homebrew-tap
