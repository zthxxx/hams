# Store-level hams config.
#
# Lives inside the store root (`<store>/hams.config.yaml`) and is merged
# into the effective config at load time. Only store-scoped settings
# belong here.
#
# DO NOT add machine-scoped fields (`profile_tag`, `machine_id`) to this
# file. Those live in the global config at `~/.config/hams/hams.config.yaml`
# (or `hams.config.local.yaml` for per-machine overrides). hams will reject
# any store-level config that contains them.
