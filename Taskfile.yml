# Usage: https://taskfile.dev/usage/
# Schema Reference: https://taskfile.dev/reference/schema
# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Note:
#   - To override variables when calling another task,
#     you need to pass the variable with `vars` key every time.
#   - shell command run in [`gosh`](https://github.com/mvdan/sh) shell,
#     interpreter with bash support
---

version: "3"

# https://taskfile.dev/usage/#set-and-shopt
set: [pipefail]
shopt: [globstar]

silent: false

vars:
  APP_NAME: hams
  BUILD_DIR: bin
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: >-
    -s -w
    -X github.com/zthxxx/hams/internal/version.version={{.VERSION}}
    -X github.com/zthxxx/hams/internal/version.commit={{.COMMIT}}
    -X github.com/zthxxx/hams/internal/version.date={{.DATE}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the application
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.APP_NAME}} ./cmd/hams
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.APP_NAME}}"

  build:linux:
    desc: Build linux/amd64 binary for e2e tests
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/hams-linux-amd64 ./cmd/hams
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/hams-linux-amd64"

  build:all:
    desc: Cross-compile for all target platforms (CGO_ENABLED=0)
    cmds:
      - bash scripts/build-all.sh

  build:release:
    desc: Build release binaries with checksums
    cmds:
      - bash scripts/build-all.sh
      - cd {{.BUILD_DIR}} && sha256sum hams-* > checksums.txt
    generates:
      - "{{.BUILD_DIR}}/hams-*"
      - "{{.BUILD_DIR}}/checksums.txt"

  run:
    desc: Run the application
    cmds:
      - go run -ldflags "{{.LDFLAGS}}" ./cmd/hams

  # ---------------------------------------------------------------------------
  # Dev sandbox — throwaway Linux container with Go hot-reload.
  # Per-example container name is hams-<EXAMPLE>; parallel examples coexist.
  # See scripts/commands/dev/ for orchestration details.
  # ---------------------------------------------------------------------------

  dev:
    desc: 'Start dev sandbox with hot reload (usage: task dev EXAMPLE=basic-debian)'
    cmds:
      - bash scripts/commands/dev/main.sh --example {{.EXAMPLE}}
    requires:
      vars: [EXAMPLE]
    interactive: true

  dev:shell:
    desc: 'Attach interactive shell to the sandbox (usage: task dev:shell EXAMPLE=basic-debian)'
    cmds:
      - docker exec -it hams-{{.EXAMPLE}} bash
    requires:
      vars: [EXAMPLE]
    interactive: true

  test:
    desc: Run all tests CI also runs (unit + integration + sudo + per-provider itest + e2e)
    cmds:
      - task: test:unit
      - task: test:integration
      - task: test:sudo
      - task: test:itest
      - task: test:e2e

  test:unit:
    desc: Run unit tests with race detection
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...

  test:cover:
    desc: Show test coverage in browser
    deps: [test]
    cmds:
      - go tool cover -html=coverage.out -o coverage.html
      - open coverage.html

  test:property:
    desc: Run property-based tests only
    cmds:
      - go test -race -count=1 -run "TestProperty" ./...

  # ---------------------------------------------------------------------------
  # Integration & E2E tests — default local runs invoke the `ci:*` tasks
  # directly (byte-for-byte the same recipes CI runs). The `:one-via-act`
  # variants simulate the full GitHub Actions runner via `act` when that
  # extra scrutiny is warranted.
  #
  # Why not use act as the default? act's builtin artifact-server doesn't
  # fully emulate `actions/upload-artifact@v4`'s CreateArtifact endpoint
  # — it fails with ECONNRESET on the final PUT. The `ci:*` tasks use
  # docker directly with a locally-built binary mounted in, so they work
  # reliably both in real CI runners and on a dev machine.
  # ---------------------------------------------------------------------------

  test:e2e:
    desc: Run all e2e targets (debian + alpine + openwrt) via ci:e2e:run
    deps: [build:linux]
    cmds:
      - for: { var: 'TARGETS', as: TARGET, split: ' ' }
        cmd: TARGET={{.TARGET}} task ci:e2e:run
    vars:
      TARGETS: debian alpine openwrt

  test:e2e:one:
    desc: "Run a single e2e target via ci:e2e:run (usage: task test:e2e:one TARGET=alpine)"
    deps: [build:linux]
    cmds:
      - TARGET={{.TARGET}} task ci:e2e:run
    requires:
      vars: [TARGET]

  test:e2e:one-via-act:
    desc: "Simulate the full CI e2e job via act (usage: task test:e2e:one-via-act TARGET=alpine). act may fail on upload-artifact@v4; use the non-act variant for reliability."
    cmds:
      - act push --container-architecture linux/amd64 -j build -j e2e --matrix goos:linux --matrix goarch:amd64 --matrix target:{{.TARGET}} --artifact-server-path /tmp/act-artifacts --rm
    requires:
      vars: [TARGET]

  test:integration:
    desc: Run integration tests via ci:integration:run (docker, no act)
    cmds:
      - task: ci:integration:run

  test:sudo:
    desc: Run sudo DI tests via ci:sudo:run (docker, no act)
    cmds:
      - task: ci:sudo:run

  test:itest:
    desc: Run per-provider integration tests via ci:itest (docker, no act)
    deps: [build:linux]
    cmds:
      - task: ci:itest

  ci:
    desc: Run full CI pipeline locally via act (lint + test + build + integration + e2e)
    cmds:
      - act push --container-architecture linux/amd64 --artifact-server-path /tmp/act-artifacts --rm

  # ---------------------------------------------------------------------------
  # ci:* — direct-command tasks invoked from .github/workflows/ci.yml. These
  # are NOT run through act; they perform the underlying work that CI steps
  # used to inline as raw commands. Running `task ci:<name>` on a dev machine
  # executes the identical recipe CI runs, guaranteeing local/CI isomorphism.
  # ---------------------------------------------------------------------------

  ci:lint:go:
    desc: CI lint — golangci-lint
    cmds:
      - task: lint:go

  ci:lint:md:
    desc: CI lint — markdownlint
    cmds:
      - task: lint:md

  ci:lint:spell:
    desc: CI lint — cspell
    cmds:
      - task: lint:spell

  ci:unit:
    desc: CI unit tests — go test -race -count=1 with coverage
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...

  ci:build:
    desc: "CI build — single target from GOOS/GOARCH env (usage: GOOS=linux GOARCH=amd64 task ci:build)"
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.APP_NAME}}-${GOOS}-${GOARCH} ./cmd/hams
    requires:
      vars: []

  ci:release:package:
    desc: "CI release packaging — flatten download-artifact dist/**/hams-* into release/ and generate checksums.txt"
    cmds:
      - mkdir -p release
      - find dist -type f -name 'hams-*' -exec cp {} release/ \;
      - cd release && sha256sum hams-* > checksums.txt
    generates:
      - release/hams-*
      - release/checksums.txt

  ci:integration:run:
    desc: CI integration — build Dockerfile and run go test -tags=integration inside it
    cmds:
      - |
        HASH=$(cat e2e/integration/Dockerfile go.mod go.sum | sha256sum | head -c 12)
        IMAGE="hams-integration:${HASH}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build -f e2e/integration/Dockerfile -t "$IMAGE" .
          docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' \
            | grep '^hams-integration:' | grep -v ":${HASH}$" \
            | xargs -r docker rmi 2>/dev/null || true
        fi
        docker run --rm \
          -v "$(pwd):/src" \
          "$IMAGE" \
          go test -v -tags=integration -race -count=1 ./...

  ci:sudo:run:
    desc: CI sudo — build Dockerfile and run sudo tests inside it
    cmds:
      - |
        HASH=$(cat e2e/sudo/Dockerfile go.mod go.sum | sha256sum | head -c 12)
        IMAGE="hams-sudo:${HASH}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build -f e2e/sudo/Dockerfile -t "$IMAGE" .
          docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' \
            | grep '^hams-sudo:' | grep -v ":${HASH}$" \
            | xargs -r docker rmi 2>/dev/null || true
        fi
        docker run --rm \
          -v "$(pwd):/src" \
          "$IMAGE" \
          bash /src/e2e/sudo/run-tests.sh

  ci:e2e:run:
    desc: "CI e2e — build target Dockerfile and run its run-tests.sh (usage: TARGET=debian task ci:e2e:run)"
    cmds:
      - |
        HASH=$(sha256sum e2e/${TARGET}/Dockerfile | head -c 12)
        IMAGE="hams-e2e-${TARGET}:${HASH}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build -f e2e/${TARGET}/Dockerfile -t "$IMAGE" e2e/${TARGET}
          docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' \
            | grep "^hams-e2e-${TARGET}:" | grep -v ":${HASH}$" \
            | xargs -r docker rmi 2>/dev/null || true
        fi
        docker run --rm \
          -v "$(pwd)/bin/hams-linux-amd64:/usr/local/bin/hams:ro" \
          -v "$(pwd)/e2e/base/lib:/e2e/base/lib:ro" \
          -v "$(pwd)/e2e/${TARGET}:/e2e/${TARGET}:ro" \
          -v "$(pwd)/e2e/${TARGET}/run-tests.sh:/run-tests.sh:ro" \
          -v "$(pwd)/e2e/fixtures:/fixtures:ro" \
          "$IMAGE" \
          bash /run-tests.sh
    requires:
      vars: [TARGET]

  # ---------------------------------------------------------------------------
  # Per-provider integration tests (ci:itest:*).
  #
  # Every linux-containerizable builtin provider owns its integration test
  # under `internal/provider/builtin/<provider>/integration/`. The tests run
  # in docker, one container per provider; the `hams-itest-base` image
  # holds only debian-slim + ca-certs, curl, bash, git, sudo, yq. Each
  # provider's `Dockerfile` is `FROM ${BASE}` with minimal delta and its
  # `integration.sh` installs whatever runtime hams itself would install
  # (python, node, go, rust, brew, …) — because that's exactly what hams
  # has to do for real users. Base and per-provider images are both
  # content-addressed so rebuilds only happen when the relevant Dockerfile
  # changes.
  # ---------------------------------------------------------------------------

  ci:itest:base:
    desc: Build the shared hams-itest-base image (debian-slim + yq + sudo). Cached by content hash.
    vars:
      BASE_HASH:
        sh: sha256sum e2e/base/Dockerfile | head -c 12
    cmds:
      - |
        IMAGE="hams-itest-base:{{.BASE_HASH}}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build -f e2e/base/Dockerfile -t "$IMAGE" e2e/base
          docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' \
            | grep '^hams-itest-base:' | grep -v ':{{.BASE_HASH}}$' \
            | xargs -r docker rmi 2>/dev/null || true
        fi

  ci:itest:run:
    desc: "CI per-provider integration — build provider image and run its integration.sh (usage: PROVIDER=apt task ci:itest:run)"
    deps: [ci:itest:base]
    vars:
      BASE_HASH:
        sh: sha256sum e2e/base/Dockerfile | head -c 12
      PROV_DIR: 'internal/provider/builtin/{{.PROVIDER}}/integration'
      # IMPORTANT: PROV_HASH must compose the BASE Dockerfile + the
      # provider Dockerfile so a base-image bump invalidates downstream
      # provider images. Hashing only the provider Dockerfile would let
      # cached `hams-itest-<provider>:<old>` images keep using stale
      # base layers after `hams-itest-base` was rebuilt.
      PROV_HASH:
        sh: 'cat e2e/base/Dockerfile internal/provider/builtin/{{.PROVIDER}}/integration/Dockerfile | sha256sum | head -c 12'
    cmds:
      - |
        BASE="hams-itest-base:{{.BASE_HASH}}"
        IMAGE="hams-itest-{{.PROVIDER}}:{{.PROV_HASH}}"
        if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
          docker build \
            --build-arg BASE="$BASE" \
            -f {{.PROV_DIR}}/Dockerfile \
            -t "$IMAGE" \
            {{.PROV_DIR}}
          docker images --format '{{"{{"}}.Repository{{"}}"}}:{{"{{"}}.Tag{{"}}"}}' \
            | grep '^hams-itest-{{.PROVIDER}}:' | grep -v ':{{.PROV_HASH}}$' \
            | xargs -r docker rmi 2>/dev/null || true
        fi
        docker run --rm \
          -v "$(pwd)/bin/hams-linux-amd64:/usr/local/bin/hams:ro" \
          -v "$(pwd)/e2e/base/lib:/e2e/base/lib:ro" \
          -v "$(pwd)/{{.PROV_DIR}}:/integration:ro" \
          "$IMAGE" \
          bash /integration/integration.sh
    requires:
      vars: [PROVIDER]

  ci:itest:
    desc: Run per-provider integration tests for every in-scope builtin provider (linux-containerizable only).
    cmds:
      - |
        # In-scope providers (11 linux-containerizable). macOS-only providers
        # (defaults, duti, mas) are intentionally excluded.
        PROVIDERS="apt ansible bash cargo git goinstall homebrew npm pnpm uv vscodeext"
        FAILED=""
        for P in $PROVIDERS; do
          echo ""
          echo "=============================================="
          echo " integration: $P"
          echo "=============================================="
          if [ ! -f "internal/provider/builtin/$P/integration/integration.sh" ]; then
            echo "  skipped (integration/integration.sh not yet written for $P)"
            continue
          fi
          if ! PROVIDER=$P task ci:itest:run; then
            FAILED="$FAILED $P"
          fi
        done
        if [ -n "$FAILED" ]; then
          echo ""
          echo "Integration tests FAILED for:$FAILED"
          exit 1
        fi

  test:itest:one:
    desc: "Run a single provider integration test via ci:itest:run (usage: PROVIDER=apt task test:itest:one)"
    deps: [build:linux]
    cmds:
      - PROVIDER={{.PROVIDER}} task ci:itest:run
    requires:
      vars: [PROVIDER]

  test:itest:one-via-act:
    desc: "Simulate the full CI itest job via act (usage: PROVIDER=apt task test:itest:one-via-act). act may fail on upload-artifact@v4; use the non-act variant for reliability."
    cmds:
      - act push --container-architecture linux/amd64 -j itest --matrix provider:{{.PROVIDER}} --rm
    requires:
      vars: [PROVIDER]

  ci:test:
    desc: Run CI unit-test job via act
    cmds:
      - act push --container-architecture linux/amd64 -j test --rm

  lint:
    desc: Run all linters
    cmds:
      - task: lint:go
      - task: lint:md

  lint:go:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  lint:go:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix ./...

  lint:md:
    desc: Run markdownlint
    cmds:
      - bun markdownlint-cli2 "**/*.md" "#node_modules"

  lint:spell:
    desc: Run cspell spell checker
    cmds:
      - bun cspell lint --no-progress "**"

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w .
      - goimports -w -local github.com/zthxxx/hams .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  check:
    desc: Run all local checks (fmt, lint, all tests includes e2e)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f coverage.out coverage.html

  setup:
    desc: Install development tools
    cmds:
      - pnpm@10 install
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/evilmartians/lefthook/v2@v2.1.5
      - lefthook install
