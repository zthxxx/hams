name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: task ci:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hams-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/hams-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Package release files
        run: task ci:release:package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          # Mark any tag containing "-" (semver pre-release marker — e.g.
          # v1.0.0-alpha.1, v1.0.0-beta.2, v1.0.0-rc.3) as a GitHub
          # pre-release. Consequence: /releases/latest skips it. Stable
          # consumers (install.sh, the in-binary self-updater, Homebrew
          # users) stay pinned to the last stable semver; early adopters
          # opt in explicitly via `install.sh --version vX.Y.Z-beta.N`.
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-homebrew-tap:
    name: Bump Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    # Only stable semver flows to Homebrew users. Any tag containing "-"
    # (alpha/beta/rc/etc.) is a semver pre-release and is skipped — early
    # adopters install those explicitly via `install.sh --version ...`.
    if: "!contains(github.ref_name, '-')"
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Formula in zthxxx/homebrew-tap
        env:
          # PAT with `repo` scope on zthxxx/homebrew-tap. The default
          # GITHUB_TOKEN cannot reach another repository, so a dedicated
          # secret is required. See scripts/ci/bump-homebrew-tap.sh for the
          # full contract (required scopes, retry semantics, PR shape).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: task ci:release:bump-homebrew-tap
