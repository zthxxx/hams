version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout
  sort-results: true
  sort-order:
    - linter
    - severity
    - file

linters:
  enable:
    # bugs
    - govet
    - staticcheck
    - errcheck
    - bodyclose
    - durationcheck
    - nilerr
    - noctx
    - rowserrcheck
    - sqlclosecheck

    # style & convention
    - revive
    - misspell
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace
    - predeclared

    # security
    - gosec

    # performance
    - prealloc

    # code quality
    - gocritic
    - errname
    - errorlint
    - goconst
    - godot
    - makezero
    - nakedret
    - nestif
    - nolintlint
    - tparallel
    - wastedassign

    # modernization
    - modernize
    - intrange
    - copyloopvar

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated

    errcheck:
      check-type-assertions: true
      check-blank: true

    nestif:
      min-complexity: 6

    nakedret:
      max-func-lines: 30

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - goconst
          - gocritic
    paths:
      - vendor

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/zthxxx/hams

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
