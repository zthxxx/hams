name: CI

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - run: task ci:lint:go

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: bun install --frozen-lockfile

      - run: task ci:lint:md

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ci:unit

      - name: Upload coverage
        # act's artifact server doesn't emulate upload-artifact@v4 reliably
        # (CreateArtifact returns ECONNRESET). Skip under ACT so local
        # simulation doesn't fail on a production-only artifact handoff.
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: task ci:build

      - name: Upload binary
        # Skip under ACT (act's artifact-server emits ECONNRESET on the v4
        # upload protocol). Real CI uses this artifact for the e2e+itest
        # downstream jobs; locally via act those jobs rebuild in-place.
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: hams-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/hams-${{ matrix.goos }}-${{ matrix.goarch }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ci:integration:run

  sudo:
    name: Sudo Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task ci:sudo:run

  e2e:
    name: E2E (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        target: [debian, alpine, openwrt]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        # Real CI: downloads the already-built binary from the build job.
        # Under ACT: the upload step was skipped (see build job), so we
        # rebuild the binary in-place here. Go toolchain only needed in
        # the ACT case.
        if: ${{ env.ACT }}
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download linux/amd64 binary
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: hams-linux-amd64
          path: bin/

      - name: Build linux/amd64 binary (act fallback)
        if: ${{ env.ACT }}
        run: task build:linux

      - name: Make binary executable
        run: chmod +x bin/hams-linux-amd64

      - env:
          TARGET: ${{ matrix.target }}
        run: task ci:e2e:run

  itest:
    name: Integration (${{ matrix.provider }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      # fail-fast: false so one flaky provider doesn't mask others.
      fail-fast: false
      matrix:
        # 11 linux-containerizable builtin providers. macOS-only providers
        # (defaults, duti, mas) are intentionally excluded
        provider:
          - apt
          - ansible
          - bash
          - cargo
          - git
          - goinstall
          - homebrew
          - npm
          - pnpm
          - uv
          - vscodeext
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: ${{ env.ACT }}
        with:
          go-version: "1.26"

      - uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download linux/amd64 binary
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: hams-linux-amd64
          path: bin/

      - name: Build linux/amd64 binary (act fallback)
        if: ${{ env.ACT }}
        run: task build:linux

      - name: Make binary executable
        run: chmod +x bin/hams-linux-amd64

      - env:
          PROVIDER: ${{ matrix.provider }}
        run: task ci:itest:run
